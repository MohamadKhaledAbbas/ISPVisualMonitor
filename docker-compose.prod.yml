# Single-node production Docker Compose baseline.
# For HA production, use the Kubernetes manifests under deploy/k8s.

services:
  api:
    image: ghcr.io/mohamadkhaledabbas/ispvisualmonitor:${VERSION:-latest}
    pull_policy: always
    init: true
    restart: unless-stopped
    environment:
      - DEPLOYMENT_MODE=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - LICENSE_SERVER_URL=${LICENSE_SERVER_URL:-}
      - LICENSE_KEY=${LICENSE_KEY:-}
      - ENABLE_METRICS=true
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ispmonitor

  poller:
    image: ghcr.io/mohamadkhaledabbas/ispvisualmonitor:${VERSION:-latest}
    pull_policy: always
    init: true
    restart: unless-stopped
    command: ["./ispmonitor", "--mode=poller"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      - DEPLOYMENT_MODE=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - LICENSE_SERVER_URL=${LICENSE_SERVER_URL:-}
      - LICENSE_KEY=${LICENSE_KEY:-}
      - POLLER_WORKERS=20
      - POLLER_CONCURRENT=100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ispmonitor

  nginx:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: ghcr.io/mohamadkhaledabbas/ispvisualmonitor-web:${VERSION:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ispmonitor

networks:
  ispmonitor:
    driver: bridge
